<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cetak Kartu Ujian SMANJO</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #0EA5E9; 
      --dark: #0F172A;
      --border: #CBD5E1;
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #F1F5F9; 
      color: var(--dark); 
      margin: 0; 
      padding: 20px; 
    }
    
    .header-admin { text-align: center; margin-bottom: 30px; }
    .btn-print { 
      background: linear-gradient(135deg, #0EA5E9 0%, #10B981 100%); 
      color: white; border: none; padding: 12px 28px; 
      border-radius: 8px; font-weight: 700; cursor: pointer; 
      font-size: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
      transition: 0.2s;
    }
    .btn-print:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(14, 165, 233, 0.4); }
    
    /* Layout Layar Komputer */
    #kartu-container { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      gap: 20px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Desain Kartu Profesional */
    .kartu { 
      background: white; 
      border: 2px solid var(--border); 
      border-radius: 12px; 
      padding: 15px; 
      box-sizing: border-box;
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    
    .kartu-kop { 
      display: flex; 
      align-items: center; 
      border-bottom: 2px solid var(--dark); 
      padding-bottom: 8px; 
      margin-bottom: 12px; 
    }
    
    .teks-kop { flex: 1; text-align: center; }
    .teks-kop h3 { margin: 0; font-size: 14px; font-weight: 800; letter-spacing: 0.5px; }
    .teks-kop h2 { margin: 0; font-size: 16px; font-weight: 800; color: var(--primary); }
    .teks-kop p { margin: 2px 0 0; font-size: 10px; font-weight: 600; color: #64748B; text-transform: uppercase; }
    
    /* Tabel Data Siswa agar sejajar rapi */
    .tabel-data { width: 100%; font-size: 13px; border-collapse: collapse; }
    .tabel-data td { padding: 4px 0; vertical-align: top; }
    .tabel-data td:nth-child(1) { width: 30%; font-weight: 600; color: #475569; }
    .tabel-data td:nth-child(2) { width: 5%; text-align: center; font-weight: 600; }
    .tabel-data td:nth-child(3) { width: 65%; font-weight: 700; color: var(--dark); }
    
    .pw-box { 
      background: #F1F5F9; 
      padding: 2px 6px; 
      border-radius: 4px; 
      font-family: 'Courier New', Courier, monospace; 
      font-size: 14px; 
      letter-spacing: 1px; 
      border: 1px solid #CBD5E1;
    }

    .kartu-footer {
      text-align: center;
      margin-top: 12px;
      font-size: 9px;
      font-weight: 600;
      color: #94A3B8;
      border-top: 1px dashed var(--border);
      padding-top: 8px;
    }

    /* =========================================
       CSS KHUSUS CETAK A4 (12 KARTU PER LEMBAR) 
       ========================================= */
    @media print {
      @page { 
        size: A4; 
        margin: 10mm; /* Margin kertas standar */
      }
      body { 
        background-color: white; 
        padding: 0; 
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
      }
      
      .header-admin, .btn-print, #status-loading { display: none !important; }
      
      /* Grid 2 Kolom x 6 Baris untuk format A4 (Total 12) */
      #kartu-container { 
        display: grid; 
        grid-template-columns: repeat(2, 1fr); 
        grid-template-rows: repeat(6, 4.3cm); /* Tinggi mutlak diperkecil agar muat 6 baris */
        gap: 4mm; /* Jarak antar kartu disesuaikan */
        max-width: 100%;
      }
      
      .kartu { 
        border: 1.5px solid black; /* Border tegas untuk potong kertas */
        border-radius: 0; /* Sudut lancip lebih mudah dipotong pakai penggaris/cutter */
        box-shadow: none;
        padding: 8px; /* Padding dikurangi agar konten muat */
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .teks-kop h2 { color: black !important; } /* Hemat tinta warna */
      .pw-box { background: white; border-color: black; }
    }
  </style>
</head>
<body>

  <div class="header-admin">
    <h2>Admin SMANJO: Cetak Kartu CBT</h2>
    <button class="btn-print" onclick="window.print()">🖨️ Cetak Kartu (Kertas A4)</button>
    <p id="status-loading" style="font-weight:600; color:#0EA5E9;">Mengambil data dari server...</p>
  </div>

  <div id="kartu-container"></div>

  <script>
    // --- GANTI URL DI BAWAH INI DENGAN URL API APPS SCRIPT ANDA ---
    const API_URL = "https://script.google.com/macros/s/AKfycbyNFC4OPsoO3WhT8Og7hoDTZY8kwnXmxhxWzrvCNwwQyCApDrSDoge3z7K15cdO70MmWQ/exec";

    async function loadKartu() {
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "getKartu" })
        });
        const data = await response.json();
        
        if (data.error) {
          document.getElementById('status-loading').innerText = "Gagal memuat: " + data.error;
          document.getElementById('status-loading').style.color = "red";
          return;
        }

        const container = document.getElementById('kartu-container');
        document.getElementById('status-loading').style.display = 'none';

        // Buat HTML kartu untuk setiap siswa
        data.forEach(siswa => {
          container.innerHTML += `
            <div class="kartu">
              <div class="kartu-kop">
                <div class="teks-kop">
                  <h3>KARTU LOGIN CBT</h3>
                  <h2>SMAN 1 WONGSOREJO</h2>
                  <p>powered by smanjo creative</p>
                </div>
              </div>
              
              <table class="tabel-data">
                <tr><td>Nama Peserta</td><td>:</td><td>${siswa.nama.toUpperCase()}</td></tr>
                <tr><td>Kelas</td><td>:</td><td>${siswa.kelas}</td></tr>
                <tr><td>Username / NISN</td><td>:</td><td>${siswa.nisn}</td></tr>
                <tr><td>Password / Token</td><td>:</td><td><span class="pw-box">${siswa.password}</span></td></tr>
              </table>

              <div class="kartu-footer">
                *Simpan kartu ini dan rahasiakan password Anda.
              </div>
            </div>
          `;
        });
      } catch (e) {
        document.getElementById('status-loading').innerText = "Koneksi ke server terputus. Pastikan link API benar.";
        document.getElementById('status-loading').style.color = "red";
      }
    }

    // Jalankan fungsi saat halaman dibuka
    loadKartu();
  </script>
</body>
</html>
